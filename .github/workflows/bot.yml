name: Gigatron Bot

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run bot
        run: python gigatron_bot.py

      - name: Save seen.json back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "update seen.json"
          git push